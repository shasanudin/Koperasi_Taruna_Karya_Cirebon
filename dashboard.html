<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
.sidebar{width:220px;position:fixed;height:100%;background:#1e293b;color:white;padding:20px}
.sidebar button{width:100%;margin:5px 0;padding:10px;border:none;background:#334155;color:white;cursor:pointer}
.main{margin-left:220px;padding:20px}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
.item-card{background:#f8fafc;padding:10px;border-radius:10px}
.item-card img{width:100%;height:120px;object-fit:cover;border-radius:8px}
button{cursor:pointer}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="show('barang')">Barang</button>
  <button onclick="show('jasa')">Jasa</button>
</div>

<div class="main">

<!-- BARANG -->
<div id="barang" class="card">
  <h3>Tambah Barang</h3>
  <input id="namaBarang" placeholder="Nama"><br><br>
  <input id="hargaBarang" placeholder="Harga"><br><br>
  <input id="gambarBarangUrl" placeholder="URL Gambar"><br><br>
  <button onclick="tambahBarang()">Simpan</button>

  <div id="listBarang" class="grid"></div>
</div>

<!-- JASA -->
<div id="jasa" class="card" style="display:none">
  <h3>Tambah Jasa</h3>

  <input id="namaJasa" placeholder="Nama jasa"><br><br>
  <input id="hargaJasa" placeholder="Harga jasa"><br><br>

  <input id="gambarJasaUrl" placeholder="URL gambar jasa"><br>
  <img id="previewJasa" style="max-width:200px;display:none;margin-top:10px">

  <br><br>
  <button onclick="tambahJasa()">Simpan</button>

  <div id="listJasa" class="grid"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const config = {
  apiKey: "API_KEY",
  authDomain: "PROJECT.firebaseapp.com",
  projectId: "PROJECT"
};

const app = initializeApp(config);
const db = getFirestore(app);

/* NAV */
window.show = (id)=>{
  barang.style.display="none";
  jasa.style.display="none";
  document.getElementById(id).style.display="block";
}

/* PREVIEW JASA */
const inputJasa = document.getElementById("gambarJasaUrl");
const previewJasa = document.getElementById("previewJasa");

inputJasa.addEventListener("input", ()=>{
  const url = inputJasa.value;
  if(url.startsWith("http")){
    previewJasa.src = url;
    previewJasa.style.display = "block";
  }else{
    previewJasa.style.display = "none";
  }
});

/* TAMBAH BARANG */
window.tambahBarang = async ()=>{
  await addDoc(collection(db,"barang"),{
    nama:namaBarang.value,
    harga:hargaBarang.value,
    gambar:gambarBarangUrl.value
  });
  loadBarang();
}

/* LOAD BARANG */
async function loadBarang(){
  const snap = await getDocs(collection(db,"barang"));
  listBarang.innerHTML="";
  snap.forEach(d=>{
    const b=d.data();
    listBarang.innerHTML+=`
      <div class="item-card">
        <img src="${b.gambar||'https://via.placeholder.com/200'}">
        <b>${b.nama}</b>
        <p>${b.harga}</p>
        <button onclick="hapus('barang','${d.id}')">Hapus</button>
      </div>
    `;
  });
}

/* TAMBAH JASA */
window.tambahJasa = async ()=>{
  await addDoc(collection(db,"jasa"),{
    nama:namaJasa.value,
    harga:hargaJasa.value,
    gambar:gambarJasaUrl.value
  });

  namaJasa.value="";
  hargaJasa.value="";
  gambarJasaUrl.value="";
  previewJasa.style.display="none";

  loadJasa();
}

/* LOAD JASA */
async function loadJasa(){
  const snap = await getDocs(collection(db,"jasa"));
  listJasa.innerHTML="";
  snap.forEach(d=>{
    const j=d.data();
    listJasa.innerHTML+=`
      <div class="item-card">
        <img src="${j.gambar||'https://via.placeholder.com/200'}">
        <b>${j.nama}</b>
        <p>${j.harga}</p>
        <button onclick="hapus('jasa','${d.id}')">Hapus</button>
      </div>
    `;
  });
}

/* HAPUS */
window.hapus = async (col,id)=>{
  await deleteDoc(doc(db,col,id));
  loadBarang();
  loadJasa();
}

loadBarang();
loadJasa();

</script>

</body>
</html>
