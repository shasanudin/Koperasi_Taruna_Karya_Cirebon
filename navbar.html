<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar - Koperasi Taruna Karya Cirebon</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    /* Demo content styling */
    .demo-content {
      text-align: center;
      padding: 80px 20px;
      color: white;
    }

    .demo-content h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .demo-content p {
      font-size: 1.2rem;
      opacity: 0.95;
    }

    /* ========== NAVBAR STYLING YANG DIPERBAIKI ========== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      color: white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: all 0.3s ease;
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
    }

    /* Logo styling dengan efek gradien */
    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #38bdf8, #818cf8);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .logo:hover {
      background-position: right center;
      transform: scale(1.02);
    }

    /* Logo dengan ikon */
    .logo::before {
      content: '\f19c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      margin-right: 10px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 1.3rem;
    }

    /* Menu container */
    .menu {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Link styling */
    .menu a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
    }

    /* Efek hover pada link biasa */
    .menu a:not(.btn):not(.login):hover {
      color: #38bdf8;
      background: rgba(56, 189, 248, 0.1);
      transform: translateY(-2px);
    }

    /* Active link indicator */
    .menu a.active {
      color: #38bdf8;
      background: rgba(56, 189, 248, 0.15);
    }

    /* Tombol Gabung (btn) - Primary */
    .btn {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      padding: 8px 22px;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn:hover {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    /* Tombol Login - Outline dengan efek glassmorphism */
    .login {
      border: 1.5px solid rgba(56, 189, 248, 0.6);
      padding: 8px 22px;
      border-radius: 12px;
      background: rgba(56, 189, 248, 0.05);
      backdrop-filter: blur(5px);
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .login:hover {
      background: #38bdf8;
      color: #0f172a !important;
      border-color: #38bdf8;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
    }

    /* Ikon pada menu (opsional untuk mempercantik) */
    .menu a i {
      margin-right: 8px;
      font-size: 0.9rem;
      transition: transform 0.2s;
    }

    .menu a:hover i {
      transform: translateX(3px);
    }

    /* Tombol hamburger untuk mobile */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .hamburger:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .hamburger span {
      width: 28px;
      height: 2.5px;
      background: white;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    /* Overlay untuk mobile menu */
    .menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      backdrop-filter: blur(4px);
    }

    /* Responsive Design */
    @media (max-width: 968px) {
      .navbar {
        padding: 14px 24px;
      }
      
      .menu a {
        padding: 6px 12px;
        font-size: 0.9rem;
      }
      
      .btn, .login {
        padding: 6px 16px;
      }
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      .menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 280px;
        height: 100vh;
        background: rgba(15, 23, 42, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        justify-content: center;
        gap: 20px;
        transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
        padding: 40px 20px;
        box-shadow: -5px 0 30px rgba(0, 0, 0, 0.3);
        border-left: 1px solid rgba(56, 189, 248, 0.2);
      }

      .menu.active {
        right: 0;
      }

      .menu a {
        width: 100%;
        text-align: center;
        padding: 14px 20px;
        font-size: 1rem;
        justify-content: center;
        display: flex;
        align-items: center;
      }

      .menu a i {
        margin-right: 12px;
        font-size: 1.1rem;
      }

      .btn, .login {
        width: 80%;
        text-align: center;
        margin-top: 10px;
      }

      .menu-overlay.active {
        display: block;
      }

      /* Animasi hamburger menjadi X */
      .hamburger.active span:nth-child(1) {
        transform: rotate(45deg) translate(6px, 6px);
      }

      .hamburger.active span:nth-child(2) {
        opacity: 0;
      }

      .hamburger.active span:nth-child(3) {
        transform: rotate(-45deg) translate(6px, -6px);
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 12px 20px;
      }

      .logo {
        font-size: 1.1rem;
      }

      .logo::before {
        font-size: 1.1rem;
      }
    }

    /* Smooth scroll */
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Koperasi Taruna Karya Cirebon</div>
  
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="menu" id="menu">
    <a href="index.html" class="active">
      <i class="fas fa-home"></i> Beranda
    </a>
    <a href="barang.html">
      <i class="fas fa-box"></i> Barang
    </a>
    <a href="jasa.html">
      <i class="fas fa-briefcase"></i> Jasa
    </a>
    <a href="pengurus.html">
      <i class="fas fa-users"></i> Pengurus
    </a>
    <a href="kontak.html">
      <i class="fas fa-envelope"></i> Kontak
    </a>
    <a href="join.html" class="btn">
      <i class="fas fa-user-plus"></i> Gabung
    </a>
    <a href="login.html" class="login">
      <i class="fas fa-sign-in-alt"></i> Login
    </a>
  </div>
</nav>

<div class="menu-overlay" id="overlay"></div>

<!-- Demo content untuk preview -->
<div class="demo-content">
  <h1>Selamat Datang di <span style="background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; background-clip: text; color: transparent;">Koperasi Taruna Karya</span></h1>
  <p>Solusi kebutuhan barang & jasa untuk anggota | Profesional, Terpercaya, dan Modern</p>
  <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.8;">
    <i class="fas fa-arrow-down"></i> Navigasi responsif dengan animasi halus
  </p>
</div>

<script>
  // Mobile menu toggle functionality
  const hamburger = document.getElementById('hamburger');
  const menu = document.getElementById('menu');
  const overlay = document.getElementById('overlay');

  function toggleMenu() {
    hamburger.classList.toggle('active');
    menu.classList.toggle('active');
    overlay.classList.toggle('active');
    
    // Prevent body scroll when menu is open
    if (menu.classList.contains('active')) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
  }

  hamburger.addEventListener('click', toggleMenu);
  overlay.addEventListener('click', toggleMenu);

  // Close menu when clicking on a link
  const menuLinks = document.querySelectorAll('.menu a');
  menuLinks.forEach(link => {
    link.addEventListener('click', () => {
      if (menu.classList.contains('active')) {
        toggleMenu();
      }
    });
  });

  // Active link highlighting based on current page
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  menuLinks.forEach(link => {
    const href = link.getAttribute('href');
    if (href === currentPage) {
      link.classList.add('active');
    } else if (currentPage === '' && href === 'index.html') {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });

  // Navbar scroll effect - change background opacity
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const navbar = document.querySelector('.navbar');
    const currentScroll = window.pageYOffset;
    
    if (currentScroll > 50) {
      navbar.style.background = 'rgba(15, 23, 42, 0.98)';
      navbar.style.backdropFilter = 'blur(15px)';
    } else {
      navbar.style.background = 'rgba(15, 23, 42, 0.95)';
      navbar.style.backdropFilter = 'blur(10px)';
    }
    
    lastScroll = currentScroll;
  });

  // Resize handler - close menu if window is resized above mobile breakpoint
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768 && menu.classList.contains('active')) {
      toggleMenu();
    }
  });
</script>

</body>
</html>
