<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Ketua - Koperasi Taruna Karya Cirebon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Font Awesome 6 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

<style>
/* ========== SEMUA STYLE SAMA SEPERTI SEBELUMNYA ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f4f8; overflow-x: hidden; }

/* Topbar */
.topbar {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  padding: 16px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed;
  top: 0;
  right: 0;
  left: 260px;
  z-index: 99;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}
.topbar h3 { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.topbar h3 i { color: #fbbf24; }
.user-info { display: flex; align-items: center; gap: 20px; }
.user-name { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 30px; font-size: 0.85rem; }
.logout-btn { background: rgba(239, 68, 68, 0.9); border: none; padding: 10px 24px; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
.logout-btn:hover { background: #dc2626; transform: translateY(-2px); }

/* Sidebar */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  color: white;
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
  padding: 30px 20px;
  z-index: 100;
  overflow-y: auto;
}
.sidebar-logo { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-logo img { height: 60px; width: auto; border-radius: 12px; background: white; padding: 8px; }
.sidebar-logo h4 { font-size: 1rem; color: #94a3b8; }
.sidebar button {
  width: 100%; margin-top: 8px; padding: 12px 16px; border: none;
  background: rgba(255,255,255,0.05); color: #e2e8f0; cursor: pointer;
  border-radius: 12px; text-align: left; font-size: 0.95rem;
  display: flex; align-items: center; gap: 12px; transition: all 0.3s;
}
.sidebar button:hover { background: #2563eb; color: white; transform: translateX(5px); }
.sidebar button.active { background: #2563eb; color: white; }

/* Main */
.main { margin-left: 260px; padding: 90px 30px 40px 30px; min-height: 100vh; }
.card { background: white; padding: 24px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; border-left: 4px solid #fbbf24; padding-left: 15px; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 20px; border-radius: 20px; text-align: center; transition: transform 0.3s; }
.stat-card:hover { transform: translateY(-5px); }
.stat-card i { font-size: 2rem; margin-bottom: 10px; }
.stat-number { font-size: 2rem; font-weight: 800; }
.stat-label { font-size: 0.8rem; opacity: 0.9; }

/* Form */
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #334155; font-size: 0.85rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.9rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.btn-simpan { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1e293b; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; }
.btn-hapus { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-approve { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 8px; }
.btn-reject { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }

/* Approval card */
.approval-card { background: #f8fafc; border-radius: 14px; padding: 15px; margin-bottom: 12px; border-left: 4px solid; }
.approval-card.pending { border-left-color: #f59e0b; }
.approval-card.approved { border-left-color: #10b981; }
.approval-card .nama { font-weight: 700; }
.approval-card .detail { font-size: 0.8rem; color: #64748b; margin: 5px 0; }
.status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-top: 8px; }
.status-pending { background: #fef3c7; color: #d97706; }
.status-approved { background: #d1fae5; color: #059669; }

.filter-select { padding: 10px 15px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; background: white; cursor: pointer; }
.chart-container { max-width: 500px; margin: 0 auto; }

@media (max-width: 768px) {
  .sidebar { width: 70px; padding: 20px 10px; }
  .sidebar button span { display: none; }
  .sidebar button i { margin: 0; }
  .sidebar-logo h4 { display: none; }
  .topbar { left: 70px; }
  .main { margin-left: 70px; padding: 80px 20px 30px 20px; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- ========== SCRIPT VALIDASI SESSION ========== -->
<script>
(function() {
  console.log("Dashboard Ketua - Checking session...");
  
  const userSession = localStorage.getItem('userSession');
  const userRole = localStorage.getItem('userRole');
  
  console.log("userSession:", userSession);
  console.log("userRole:", userRole);
  
  // Jika tidak ada session, redirect ke login
  if (!userSession || !userRole) {
    console.log("No session found, redirecting to login");
    window.location.replace('login.html');
    return;
  }
  
  try {
    const session = JSON.parse(userSession);
    console.log("Session data:", session);
    
    const loginTime = new Date(session.loginTime);
    const now = new Date();
    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
    
    // Session expired setelah 8 jam
    if (hoursDiff > 8) {
      console.log("Session expired");
      localStorage.clear();
      sessionStorage.clear();
      window.location.replace('login.html');
      return;
    }
    
    // Validasi role harus KETUA
    if (session.role !== 'KETUA') {
      console.log("Role mismatch! Expected KETUA, got", session.role);
      const roleRedirect = {
        'SEKRETARIS': 'dashboard_sekretaris.html',
        'BENDAHARA': 'dashboard_bendahara.html',
        'PENGURUS': 'dashboard_pengurus.html',
        'ANGGOTA': 'dashboard_anggota.html'
      }[session.role];
      window.location.replace(roleRedirect || 'login.html');
      return;
    }
    
    // Tampilkan nama user
    const userNameSpan = document.getElementById('userNameDisplay');
    if (userNameSpan) {
      userNameSpan.innerHTML = `<i class="fas fa-crown"></i> ${session.nama || session.email}`;
    }
    
    console.log("Session valid for Ketua");
    
  } catch(e) {
    console.error("Session validation error:", e);
    localStorage.clear();
    window.location.replace('login.html');
  }
})();

// Fungsi Logout
window.logout = function() {
  console.log("Logging out...");
  localStorage.clear();
  sessionStorage.clear();
  window.location.replace('login.html');
};
</script>

<div class="topbar">
  <h3><i class="fas fa-crown"></i> Dashboard Ketua Koperasi</h3>
  <div class="user-info">
    <span class="user-name" id="userNameDisplay"><i class="fas fa-user"></i> Loading...</span>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-logo">
    <img src="https://raw.githubusercontent.com/shasanudin/Koperasi_Taruna_Karya_Cirebon/main/images/logo/koperasi.png" alt="Logo" onerror="this.src='https://placehold.co/200x200'">
    <h4>Koperasi Taruna</h4>
  </div>
  <button onclick="show('stat')" id="btnStat"><i class="fas fa-chart-line"></i> <span>Statistik</span></button>
  <button onclick="show('barang')" id="btnBarang"><i class="fas fa-box"></i> <span>Kelola Barang</span></button>
  <button onclick="show('jasa')" id="btnJasa"><i class="fas fa-briefcase"></i> <span>Kelola Jasa</span></button>
  <button onclick="show('approval')" id="btnApproval"><i class="fas fa-user-check"></i> <span>Approval</span></button>
</div>

<div class="main">

<!-- STATISTIK -->
<div id="stat" class="card">
  <h3><i class="fas fa-chart-simple"></i> Statistik Koperasi</h3>
  <div class="stats-grid">
    <div class="stat-card"><i class="fas fa-box"></i><div class="stat-number" id="totalBarang">0</div><div class="stat-label">Total Barang</div></div>
    <div class="stat-card"><i class="fas fa-briefcase"></i><div class="stat-number" id="totalJasa">0</div><div class="stat-label">Total Jasa</div></div>
    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number" id="totalAnggota">0</div><div class="stat-label">Anggota Aktif</div></div>
    <div class="stat-card"><i class="fas fa-user-tie"></i><div class="stat-number" id="totalPengurus">0</div><div class="stat-label">Pengurus</div></div>
  </div>
  <div class="chart-container"><canvas id="chart"></canvas></div>
</div>

<!-- BARANG -->
<div id="barang" class="card" style="display:none">
  <h3><i class="fas fa-plus-circle"></i> Tambah Barang</h3>
  <div class="form-row">
    <div class="form-group"><label>Nama Barang</label><input id="namaBarang" placeholder="Nama barang"></div>
    <div class="form-group"><label>Harga</label><input id="hargaBarang" placeholder="Harga"></div>
  </div>
  <div class="form-group"><label>URL Gambar</label><input id="gambarBarangUrl" placeholder="https://..."></div>
  <button class="btn-simpan" onclick="tambahBarang()"><i class="fas fa-save"></i> Simpan Barang</button>
  <h4>Daftar Barang</h4>
  <div id="listBarang" class="grid"></div>
</div>

<!-- JASA -->
<div id="jasa" class="card" style="display:none">
  <h3><i class="fas fa-plus-circle"></i> Tambah Jasa</h3>
  <div class="form-row">
    <div class="form-group"><label>Nama Jasa</label><input id="namaJasa" placeholder="Nama jasa"></div>
    <div class="form-group"><label>Harga</label><input id="hargaJasa" placeholder="Harga"></div>
  </div>
  <div class="form-group"><label>URL Gambar</label><input id="gambarJasaUrl" placeholder="https://..."></div>
  <button class="btn-simpan" onclick="tambahJasa()"><i class="fas fa-save"></i> Simpan Jasa</button>
  <h4>Daftar Jasa</h4>
  <div id="listJasa" class="grid"></div>
</div>

<!-- APPROVAL -->
<div id="approval" class="card" style="display:none">
  <h3><i class="fas fa-user-check"></i> Approval Pendaftaran</h3>
  <select id="filterStatus" class="filter-select" onchange="loadApproval()">
    <option value="all">Semua Status</option>
    <option value="pending">Pending</option>
    <option value="approved">Approved</option>
  </select>
  <h4>Pengurus</h4>
  <div id="listPengurus"></div>
  <h4>Anggota</h4>
  <div id="listAnggota"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const config = {
  apiKey: "AIzaSyCSnm-XNRBB1478FUbbL7OpmgX3FUpNtag",
  authDomain: "koperasi-taruna-karya-cirebon.firebaseapp.com",
  projectId: "koperasi-taruna-karya-cirebon",
};

const app = initializeApp(config);
const db = getFirestore(app);

// Navigasi
window.show = (id) => {
  ["stat", "barang", "jasa", "approval"].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = "none";
  });
  document.getElementById(id).style.display = "block";
  document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
  if (id === 'stat') document.getElementById('btnStat')?.classList.add('active');
  if (id === 'barang') document.getElementById('btnBarang')?.classList.add('active');
  if (id === 'jasa') document.getElementById('btnJasa')?.classList.add('active');
  if (id === 'approval') document.getElementById('btnApproval')?.classList.add('active');
}

// CRUD Barang
window.tambahBarang = async () => {
  const nama = document.getElementById("namaBarang").value;
  const harga = document.getElementById("hargaBarang").value;
  const gambar = document.getElementById("gambarBarangUrl").value;
  if (!nama || !harga) return alert("Isi semua field!");
  await addDoc(collection(db, "barang"), { nama, harga, gambar });
  alert("Barang ditambahkan!");
  document.getElementById("namaBarang").value = "";
  document.getElementById("hargaBarang").value = "";
  document.getElementById("gambarBarangUrl").value = "";
  loadAll();
}

async function loadBarang() {
  const snap = await getDocs(collection(db, "barang"));
  const list = document.getElementById("listBarang");
  list.innerHTML = "";
  snap.forEach(d => {
    const b = d.data();
    list.innerHTML += `<div class="item-card">
      ${b.gambar ? `<img src="${b.gambar}" onerror="this.src='https://placehold.co/400x300'">` : '<div style="height:140px;background:#e2e8f0;display:flex;align-items:center;justify-content:center"><i class="fas fa-image" style="font-size:40px"></i></div>'}
      <b>${escapeHtml(b.nama)}</b>
      <p>${escapeHtml(b.harga)}</p>
      <button class="btn-hapus" onclick="hapus('barang','${d.id}')">Hapus</button>
    </div>`;
  });
  return snap.size;
}

window.tambahJasa = async () => {
  const nama = document.getElementById("namaJasa").value;
  const harga = document.getElementById("hargaJasa").value;
  const gambar = document.getElementById("gambarJasaUrl").value;
  if (!nama || !harga) return alert("Isi semua field!");
  await addDoc(collection(db, "jasa"), { nama, harga, gambar });
  alert("Jasa ditambahkan!");
  document.getElementById("namaJasa").value = "";
  document.getElementById("hargaJasa").value = "";
  document.getElementById("gambarJasaUrl").value = "";
  loadAll();
}

async function loadJasa() {
  const snap = await getDocs(collection(db, "jasa"));
  const list = document.getElementById("listJasa");
  list.innerHTML = "";
  snap.forEach(d => {
    const j = d.data();
    list.innerHTML += `<div class="item-card">
      ${j.gambar ? `<img src="${j.gambar}" onerror="this.src='https://placehold.co/400x300'">` : '<div style="height:140px;background:#e2e8f0;display:flex;align-items:center;justify-content:center"><i class="fas fa-briefcase" style="font-size:40px"></i></div>'}
      <b>${escapeHtml(j.nama)}</b>
      <p>${escapeHtml(j.harga)}</p>
      <button class="btn-hapus" onclick="hapus('jasa','${d.id}')">Hapus</button>
    </div>`;
  });
  return snap.size;
}

window.hapus = async (col, id) => {
  if (confirm("Yakin hapus?")) {
    await deleteDoc(doc(db, col, id));
    loadAll();
  }
}

// Approval
window.loadApproval = async () => {
  const status = document.getElementById("filterStatus").value;
  const pSnap = await getDocs(collection(db, "pengurus"));
  const listPengurus = document.getElementById("listPengurus");
  listPengurus.innerHTML = "";
  pSnap.forEach(d => {
    const p = d.data();
    if (status === "all" || p.status === status) {
      listPengurus.innerHTML += `<div class="approval-card ${p.status || 'pending'}">
        <div class="nama">${escapeHtml(p.nama || '-')}</div>
        <div class="detail">Jabatan: ${escapeHtml(p.jabatan || '-')} | Email: ${escapeHtml(p.email || '-')}</div>
        <div class="status status-${p.status || 'pending'}">${p.status || 'pending'}</div>
        <div><button class="btn-approve" onclick="approve('pengurus','${d.id}')">Approve</button>
        <button class="btn-reject" onclick="reject('pengurus','${d.id}')">Reject</button></div>
      </div>`;
    }
  });
  
  const aSnap = await getDocs(collection(db, "anggota"));
  const listAnggota = document.getElementById("listAnggota");
  listAnggota.innerHTML = "";
  aSnap.forEach(d => {
    const a = d.data();
    if (status === "all" || a.status === status) {
      listAnggota.innerHTML += `<div class="approval-card ${a.status || 'pending'}">
        <div class="nama">${escapeHtml(a.nama || '-')}</div>
        <div class="detail">WA: ${escapeHtml(a.wa || '-')} | Email: ${escapeHtml(a.email || '-')}</div>
        <div class="status status-${a.status || 'pending'}">${a.status || 'pending'}</div>
        <div><button class="btn-approve" onclick="approve('anggota','${d.id}')">Approve</button>
        <button class="btn-reject" onclick="reject('anggota','${d.id}')">Reject</button></div>
      </div>`;
    }
  });
}

window.approve = async (col, id) => {
  await updateDoc(doc(db, col, id), { status: "approved" });
  loadApproval();
  loadAll();
}

window.reject = async (col, id) => {
  await updateDoc(doc(db, col, id), { status: "ditolak" });
  loadApproval();
  loadAll();
}

// Chart
let chart;
async function loadChart() {
  const b = (await getDocs(collection(db, "barang"))).size;
  const j = (await getDocs(collection(db, "jasa"))).size;
  const a = (await getDocs(collection(db, "anggota"))).size;
  const p = (await getDocs(collection(db, "pengurus"))).size;
  
  document.getElementById('totalBarang').innerText = b;
  document.getElementById('totalJasa').innerText = j;
  document.getElementById('totalAnggota').innerText = a;
  document.getElementById('totalPengurus').innerText = p;
  
  if (chart) chart.destroy();
  const ctx = document.getElementById("chart").getContext("2d");
  chart = new Chart(ctx, {
    type: "bar",
    data: { labels: ["Barang", "Jasa", "Anggota", "Pengurus"], 
            datasets: [{ label: "Total Data", data: [b, j, a, p], 
                         backgroundColor: ["#3b82f6", "#10b981", "#f59e0b", "#8b5cf6"], borderRadius: 10 }] },
    options: { responsive: true, maintainAspectRatio: true }
  });
}

function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

async function loadAll() {
  await loadChart();
  await loadBarang();
  await loadJasa();
  await loadApproval();
}

loadAll();
</script>
</body>
</html>
