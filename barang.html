<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Marketplace Barang</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
.container{padding:20px}
h2{margin-bottom:10px}

.search-box{margin-bottom:20px}
.search-box input{
  width:100%;padding:10px;border-radius:8px;border:1px solid #ccc
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px
}

.card{
  background:white;border-radius:10px;padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.3s
}
.card:hover{transform:translateY(-5px)}

.card img{
  width:100%;height:150px;object-fit:cover;border-radius:8px
}

.price{color:#2563eb;font-weight:bold}

button{
  margin-top:10px;width:100%;padding:10px;
  border:none;border-radius:6px;background:#25D366;color:white;cursor:pointer
}
</style>
</head>

<body>

<div id="navbar"></div>

<div class="container">
  <h2>Marketplace Barang</h2>

  <div class="search-box">
    <input type="text" id="search" placeholder="Cari barang...">
  </div>

  <div class="grid" id="product-list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ================= NAVBAR ================= */
fetch('navbar.html')
.then(res=>res.text())
.then(data=>navbar.innerHTML=data);

/* ================= NOMOR WA ================= */
const noWA = "6288214940995"; // GANTI NOMOR KAMU

/* ================= FIREBASE ================= */
const config = {
  apiKey:"AIzaSyCSnm-XNRBB1478FUbbL7OpmgX3FUpNtag",
  authDomain:"koperasi-taruna-karya-cirebon.firebaseapp.com",
  projectId:"koperasi-taruna-karya-cirebon",
};

const app = initializeApp(config);
const db = getFirestore(app);

/* ================= FIX URL GAMBAR ================= */
function fixImage(url){
  if(!url) return "https://via.placeholder.com/300";

  return url
    .replace("github.com","raw.githubusercontent.com")
    .replace("/blob/","/")
    .replace("koperasi-taruna-karya","Koperasi_Taruna_Karya_Cirebon");
}

/* ================= DATA ================= */
let semuaBarang = [];
const list = document.getElementById("product-list");

/* ================= REALTIME ================= */
onSnapshot(collection(db,"barang"), (snap)=>{
  semuaBarang = [];

  snap.forEach(doc=>{
    const data = doc.data();

    semuaBarang.push({
      nama: data.nama,
      harga: data.harga,
      gambar: fixImage(data.gambar)
    });
  });

  tampilkanProduk(semuaBarang);
});

/* ================= RENDER ================= */
function tampilkanProduk(data){
  list.innerHTML = "";

  data.forEach(p=>{

    const pesan = encodeURIComponent(
`Halo, saya ingin tanya tentang produk:

Nama: ${p.nama}
Harga: ${p.harga}
Gambar: ${p.gambar}`
    );

    list.innerHTML += `
      <div class="card">
        <img src="${p.gambar}" onerror="this.src='https://via.placeholder.com/300'">
        <h3>${p.nama}</h3>
        <p class="price">${p.harga}</p>

        <a href="https://wa.me/${noWA}?text=${pesan}" target="_blank">
          <button>Tanyakan via WhatsApp</button>
        </a>

      </div>
    `;
  });
}

/* ================= SEARCH ================= */
search.addEventListener("input", function(){
  const keyword = this.value.toLowerCase();

  const hasil = semuaBarang.filter(p =>
    p.nama.toLowerCase().includes(keyword)
  );

  tampilkanProduk(hasil);
});
</script>

</body>
</html>
