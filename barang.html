<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Marketplace Barang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
    }

    .container {
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: #2563eb;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<div id="navbar"></div>

<div class="container">
  <h2>Marketplace Barang</h2>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="search" placeholder="Cari barang...">
  </div>

  <!-- Produk -->
  <div class="grid" id="product-list"></div>
</div>

<script>
/* Load Navbar */
fetch('navbar.html')
.then(res => res.text())
.then(data => document.getElementById('navbar').innerHTML = data);

/* Data contoh (nanti ganti Firebase) */
const barang = [
  {
    nama: "Beras Premium 5kg",
    harga: 70000,
    gambar: "https://via.placeholder.com/300"
  },
  {
    nama: "Minyak Goreng 1L",
    harga: 20000,
    gambar: "https://via.placeholder.com/300"
  },
  {
    nama: "Gula Pasir 1kg",
    harga: 15000,
    gambar: "https://via.placeholder.com/300"
  }
];

const list = document.getElementById("product-list");

/* Render Produk */
function tampilkanProduk(data){
  list.innerHTML = "";
  data.forEach(p => {
    list.innerHTML += `
      <div class="card">
        <img src="${p.gambar}">
        <h3>${p.nama}</h3>
        <p class="price">Rp ${p.harga}</p>
        <button>Beli</button>
      </div>
    `;
  });
}

tampilkanProduk(barang);

/* Search */
document.getElementById("search").addEventListener("input", function(){
  const keyword = this.value.toLowerCase();
  const hasil = barang.filter(p => p.nama.toLowerCase().includes(keyword));
  tampilkanProduk(hasil);
});
</script>

</body>
</html>
