<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Koperasi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #2563eb, #1e3a8a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login Koperasi</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<script type="module">
  // Import Firebase (VERSI MODERN)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  // CONFIG KAMU
  const firebaseConfig = {
    apiKey: "AIzaSyCSnm-XNRBB1478FUbbL7OpmgX3FUpNtag",
    authDomain: "koperasi-taruna-karya-cirebon.firebaseapp.com",
    databaseURL: "https://koperasi-taruna-karya-cirebon-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "koperasi-taruna-karya-cirebon",
    storageBucket: "koperasi-taruna-karya-cirebon.firebasestorage.app",
    messagingSenderId: "573396276351",
    appId: "1:573396276351:web:3fcf1d78bfa5ad9a189b4a",
    measurementId: "G-RH91DN1KT8"
  };

  // INIT
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // LOGIN FUNCTION
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Login berhasil!");
      window.location.href = "dashboard.html";
    } catch (error) {
      alert("Error: " + error.message);
    }
  });
</script>

</body>
</html>
