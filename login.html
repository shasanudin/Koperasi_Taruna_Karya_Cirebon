<!-- Letakkan script ini di PALING ATAS semua dashboard, sebelum konten lainnya -->
<script>
(function() {
  // Cek session
  const userSession = localStorage.getItem('userSession');
  const userRole = localStorage.getItem('userRole');
  
  if (!userSession || !userRole) {
    window.location.href = 'login.html';
    return;
  }
  
  try {
    const session = JSON.parse(userSession);
    const loginTime = new Date(session.loginTime);
    const now = new Date();
    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
    
    // Session expired setelah 8 jam
    if (hoursDiff > 8) {
      localStorage.clear();
      window.location.href = 'login.html';
      return;
    }
    
    // Validasi role untuk halaman ini
    const currentPage = window.location.pathname.split('/').pop();
    const expectedRole = {
      'dashboard_ketua.html': 'KETUA',
      'dashboard_sekretaris.html': 'SEKRETARIS',
      'dashboard_bendahara.html': 'BENDAHARA'
    }[currentPage];
    
    if (expectedRole && session.role !== expectedRole) {
      const roleRedirect = {
        'KETUA': 'dashboard_ketua.html',
        'SEKRETARIS': 'dashboard_sekretaris.html',
        'BENDAHARA': 'dashboard_bendahara.html',
        'PENGURUS': 'dashboard_pengurus.html',
        'ANGGOTA': 'dashboard_anggota.html'
      }[session.role];
      
      if (roleRedirect && roleRedirect !== currentPage) {
        window.location.href = roleRedirect;
        return;
      }
    }
    
    // Tampilkan nama user di navbar
    document.addEventListener('DOMContentLoaded', () => {
      const userNameSpan = document.getElementById('userNameDisplay');
      if (userNameSpan) userNameSpan.innerHTML = `<i class="fas fa-user"></i> ${session.nama || session.email}`;
    });
    
  } catch(e) {
    localStorage.clear();
    window.location.href = 'login.html';
  }
})();

// Fungsi logout yang benar
window.logout = function() {
  localStorage.clear();
  sessionStorage.clear();
  
  // Hapus cookies
  document.cookie.split(";").forEach(function(c) {
    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
  });
  
  window.location.href = 'login.html';
};
</script>
